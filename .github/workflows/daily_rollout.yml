name: Daily CSV Rollout
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Pandas
        run: pip install pandas
      - name: Run Generator
        run: python generator.py
      - name: Commit Changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.csv sites/ sitemap.xml
          git commit -m "Added 10 new sites and updated sitemap" || echo "No changes"
          git push
