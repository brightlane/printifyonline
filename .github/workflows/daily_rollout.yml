name: Daily SEO Auto-Pilot (Google Version)
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Google API Libraries
        run: pip install pandas google-api-python-client google-auth requests
        
      - name: Run Engine
        env:
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
        run: python generator.py
        
      - name: Push Changes
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add keywords.csv sites/
          git diff --staged --quiet || (git commit -m "Google SEO Rollout: 10 Sites" && git push origin main)
